services:
  app1:
    image: hashicorp/http-echo
    command: ["-text=APP1"]
    ports:
      - "3001:5678"

  app2:
    image: hashicorp/http-echo
    command: ["-text=APP2"]
    ports:
      - "3002:5678"

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf